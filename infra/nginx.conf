server {
    listen 80;
    server_name _;

    # Aponta para o public/ do Laravel. Em produção o CÓDIGO não vive no nginx:
    # ele apenas repassa para o PHP-FPM (backend-app), que tem o código na imagem.
    root /var/www/public;
    index index.php;
    charset utf-8;

    server_tokens off;
    client_max_body_size 20m;

    # Segurança básica.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass backend-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # Caminho LITERAL (não use $realpath_root): o arquivo é resolvido no
        # container do PHP-FPM, não no nginx.
        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
    }

    # CORS é tratado EXCLUSIVAMENTE pelo Laravel (config/cors.php).
    # Não duplicar cabeçalhos Access-Control-* aqui.

    # Bloqueia arquivos ocultos (ex.: .env).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
