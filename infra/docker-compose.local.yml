# Ambiente LOCAL de testes. Traefik removido de propósito: para desenvolvimento
# local ele é desnecessário e estava quebrando (incompatibilidade de API do
# daemon). O backend é exposto direto em localhost:8000 e o Postgres roda dentro
# do próprio compose (serviço "db").

networks:
  internal_network:
    driver: bridge

volumes:
  db_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: laravel
    # Sem publicar porta no host: o backend acessa via rede interna (db:5432).
    # Evita conflito quando já há algo escutando na 5432 do host. Para acessar do
    # host use: docker compose -f infra/docker-compose.local.yml exec db psql -U admin -d laravel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d laravel"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal_network

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    networks:
      - internal_network

  backend-web:
    image: nginx:alpine
    volumes:
      - ../backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80" # API acessível em http://localhost:8000 (sem Traefik)
    depends_on:
      - backend-app
    networks:
      - internal_network

  backend-app:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend.local
    # Dentro do container o banco é o serviço "db" (não 127.0.0.1). Como o Laravel
    # não sobrescreve variáveis de ambiente já presentes, este DB_HOST vence o do .env.
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: admin
      DB_PASSWORD: admin
      # Loga em stderr (visível em `docker compose logs`) em vez do arquivo em
      # storage/logs — evita que uma falha de permissão de escrita mascare o
      # erro real e derrube o processo.
      LOG_CHANNEL: stderr
    # No provisionamento: aplica migrations e roda o seed padrão (tenant de teste)
    # antes de subir o PHP-FPM. O seed é idempotente (ver DatabaseSeeder).
    command: >
      sh -c "php artisan config:clear || true;
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php-fpm"
    volumes:
      - ../backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_network
