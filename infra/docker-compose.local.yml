version: "3.8"

networks:
  proxy_network:
    driver: bridge
  internal_network:
    driver: bridge
  shared_db_network:
    external: true

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - proxy_network

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../frontend:/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    ports:
      - "5173:5173"
    networks:
      - proxy_network

  backend-web:
    image: nginx:alpine
    volumes:
      - ../backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.localhost`)"
      - "traefik.http.routers.backend.entrypoints=web"
    networks:
      - proxy_network
      - internal_network

  backend-app:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend.local
    volumes:
      - ../backend:/var/www
    networks:
      - internal_network
      - shared_db_network
