networks:
  internal_network:
    driver: bridge

volumes:
  db_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: laravel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d laravel"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal_network
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    networks:
      - internal_network

  backend-web:
    image: nginx:alpine
    volumes:
      - ../backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
      - backend-app
    networks:
      - internal_network

  backend-app:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend.local
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: admin
      DB_PASSWORD: admin
      LOG_CHANNEL: stderr
    command: >
      sh -c "php artisan config:clear || true;
      php artisan migrate --force &&
      php artisan db:seed --force &&
      php-fpm"
    volumes:
      - ../backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_network
