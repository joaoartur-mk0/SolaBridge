server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Segurança (headers básicos) ----------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Não vazar a versão do nginx.
    server_tokens off;

    # ---- Performance --------------------------------------------------------
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Assets com hash no nome (Vite) podem ser cacheados agressivamente.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Fallback de SPA ----------------------------------------------------
    # Qualquer rota não encontrada cai no index.html (roteamento no cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # O index.html não deve ser cacheado, para que novos deploys apareçam.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Bloqueia acesso a arquivos ocultos (ex.: .env que por acaso vaze no build).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
