version: "3.8"

networks:
  internal_network:
    driver: bridge
  public:
    external: true
  solabridgenet:
    external: true

volumes:
  db_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin # Mude isso em produção!
      POSTGRES_DB: laravel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d laravel"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=https://bridgeapi.solasoftware.com.br/api/v1
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`bridge.solasoftware.com.br`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=meuresolver"
      - "traefik.docker.network=public"
    networks:
      - public
    restart: unless-stopped

  backend-web:
    image: nginx:alpine
    volumes:
      - ../backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`bridgeapi.solasoftware.com.br`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=meuresolver"
      - "traefik.docker.network=public"
    networks:
      - internal_network
      - public
    restart: unless-stopped

  backend-app:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend.prod
    environment:
      APP_URL: https://bridgeapi.solasoftware.com.br
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: admin
      DB_PASSWORD: admin
    volumes:
      - ../backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_network
    restart: unless-stopped
